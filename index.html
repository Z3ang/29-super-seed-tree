<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29 SUPER SEED 家族樹</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <style>
        * {
            font-family: 'DotGothic16', sans-serif !important; 
            box-sizing: border-box;
            border-radius: 0 !important; /* 絕對直角 */
        }

        /* 粗野主義背景：螢光黃綠 + 黑色網格 */
        body { 
            background-color: #DEFF1A; /* 參考圖的螢光黃綠 */
            background-image: linear-gradient(#00000020 1px, transparent 1px), linear-gradient(90deg, #00000020 1px, transparent 1px);
            background-size: 30px 30px;
            color: #000; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        
        /* 票券感的標題區塊 */
        .header-container {
            background-color: #FFFFFF;
            border: 4px solid #000000;
            box-shadow: 10px 10px 0px #000000; /* 硬邊黑陰影 */
            max-width: 800px;
            margin: 0 auto 30px auto;
            padding: 20px;
            display: inline-block;
            width: 100%;
        }

        h1 { 
            font-size: 2.5em; 
            letter-spacing: 5px; 
            font-weight: bold; 
            margin: 0 0 15px 0; 
            border-bottom: 4px solid #000; 
            padding-bottom: 15px;
            text-transform: uppercase;
        }
        
        /* 搜尋框設計 */
        .search-box { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        input[type="text"] { 
            padding: 12px; 
            width: 250px; 
            border: 3px solid #000; 
            font-size: 18px; 
            font-weight: bold;
            outline: none;
        }
        button { 
            padding: 12px 25px; 
            background-color: #000; 
            color: #DEFF1A; 
            border: 3px solid #000; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 18px; 
            transition: 0.1s;
        }
        button:hover { background-color: #FFFFFF; color: #000; }
        
        /* 選項區塊 */
        #options-container { margin-bottom: 20px; }
        .option-btn { 
            margin: 5px; 
            background-color: #FFF; 
            color: #000; 
            border: 3px solid #000; 
            padding: 10px 20px; 
            cursor: pointer; 
            box-shadow: 4px 4px 0px #000; 
            font-size: 16px; 
            font-weight: bold;
        }
        .option-btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        
        /* 孤單彩蛋 */
        .easter-egg { 
            background: #000; 
            color: #DEFF1A; 
            padding: 20px; 
            border: 4px solid #000; 
            display: inline-block; 
            box-shadow: 8px 8px 0px #FFFFFF; 
            font-size: 1.5em; 
            margin-top: 30px; 
        }
        
        /* 樹狀圖畫布 */
        #tree-network { 
            width: 100%; 
            height: 65vh; 
            background-color: #FFFFFF; 
            border: 4px solid #000000; 
            box-shadow: 12px 12px 0px #000000; 
            display: none; 
            margin: 0 auto;
            max-width: 1100px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>！家族樹！</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ex: 王小明">
            <button onclick="searchName()">尋找</button>
        </div>
    </div>

    <div id="options-container"></div>
    <div id="easter-egg-container"></div>
    <div id="tree-network"></div>

    <script>
        let treeData = null;
        let network = null;

        fetch('family_tree_data.json')
            .then(response => response.json())
            .then(data => { treeData = data; })
            .catch(error => console.error('讀取資料失敗:', error));

        function searchName() {
            const inputName = document.getElementById('searchInput').value.trim();
            const optionsContainer = document.getElementById('options-container');
            const networkContainer = document.getElementById('tree-network');
            const eggContainer = document.getElementById('easter-egg-container');
            
            optionsContainer.innerHTML = '';
            eggContainer.innerHTML = '';
            networkContainer.style.display = 'none';

            if (!inputName || !treeData) return;

            const matches = treeData.nodes.filter(n => n.name === inputName);

            if (matches.length === 0) {
                optionsContainer.innerHTML = '<p style="font-size:18px; font-weight:bold; background:#fff; border:3px solid #000; display:inline-block; padding:10px;">找不到這個名字耶，確認一下有沒有打錯字？</p>';
                return;
            }

            if (matches.length > 1) {
                optionsContainer.innerHTML = '<p style="font-weight:bold; font-size:18px;">發現多位同名學長姐/學弟妹，請選擇屆數：</p>';
                matches.forEach(match => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `第 ${match.generation} 屆`;
                    btn.onclick = () => renderTree(match);
                    optionsContainer.appendChild(btn);
                });
            } else {
                renderTree(matches[0]);
            }
        }

        function renderTree(targetNode) {
            document.getElementById('options-container').innerHTML = ''; 
            const networkContainer = document.getElementById('tree-network');
            const eggContainer = document.getElementById('easter-egg-container');

            if (targetNode.isIsolated) {
                networkContainer.style.display = 'none';
                eggContainer.innerHTML = `
                    <div class="easter-egg">
                        ✨ 全家就是你家！獨立生長的酷酷靈魂 ✨<br><br>
                        NO.${targetNode.generation} - ${targetNode.name}
                    </div>
                `;
                return;
            }

            networkContainer.style.display = 'block';

            const familyNodes = treeData.nodes.filter(n => n.family === targetNode.family);
            const familyNodeIds = new Set(familyNodes.map(n => n.id));
            const familyLinks = treeData.links.filter(l => familyNodeIds.has(l.source) && familyNodeIds.has(l.target));

            const visNodes = new vis.DataSet(
                familyNodes.map(n => {
                    let nodeStyle = {
                        id: n.id,
                        label: `NO.${n.generation}\n${n.name}`,
                        shape: 'box',
                        shapeProperties: { borderRadius: 0 },
                        margin: 15,
                        borderWidth: 3,
                        color: { background: '#FFFFFF', border: '#000000' },
                        font: { size: 18, color: '#000000', face: 'DotGothic16', bold: true }
                    };

                    // 第29屆：視覺反轉！純黑底色 + 螢光黃綠字
                    if (n.isSuperSeed) {
                        nodeStyle.color = { background: '#000000', border: '#000000' };
                        nodeStyle.font = { color: '#DEFF1A', size: 20 };
                    }

                    // 搜尋的主角加上紅色粗框強調
                    if (n.id === targetNode.id) {
                        nodeStyle.borderWidth = 5;
                        nodeStyle.color.border = '#FF0000'; 
                    }

                    return nodeStyle;
                })
            );

            const visEdges = new vis.DataSet(
                familyLinks.map(l => ({
                    from: l.source,
                    to: l.target,
                    arrows: 'to',
                    color: { color: '#000000' }, // 粗黑連線
                    width: 2,
                    smooth: false // 俐落直線
                }))
            );

            const options = {
                layout: {
                    hierarchical: {
                        direction: 'UD',
                        sortMethod: 'directed',
                        levelSeparation: 120,
                        nodeSpacing: 250
                    }
                },
                physics: {
                    hierarchicalRepulsion: { nodeDistance: 220, damping: 0.1 },
                    stabilization: { iterations: 150 }
                },
                interaction: { dragNodes: true, zoomView: true }
            };

            if (network !== null) { network.destroy(); }
            network = new vis.Network(networkContainer, { nodes: visNodes, edges: visEdges }, options);
            
            network.once('afterDrawing', function() {
                network.focus(targetNode.id, {
                    scale: 0.9,
                    animation: { duration: 1000, easingFunction: 'easeInOutQuad' }
                });
            });
        }
    </script>
</body>
</html>
