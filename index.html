<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29 Super Seed 家族樹</title>
    <style>
        /* 灰白背景與基礎字體設定 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #F5F5F5; color: #333; text-align: center; padding: 20px; }
        h1 { color: #88B04B; /* 黃綠色主視覺 */ }
        
        /* 搜尋框設計 */
        .search-box { margin: 20px; }
        input[type="text"] { padding: 10px; width: 200px; border: 2px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; background-color: #88B04B; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #769941; }

        /* 家族樹顯示區塊 */
        #tree-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        /* 節點卡片設計 */
        .node-card { background: white; padding: 15px 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #ccc; min-width: 150px; }
        .node-generation { font-size: 0.8em; color: #888; margin-bottom: 5px; }
        .node-name { font-size: 1.2em; font-weight: bold; }

        /* 第29屆專屬特效 (黃綠色發光) */
        .super-seed { border-left: 5px solid #88B04B; background-color: #fafff0; box-shadow: 0 0 15px rgba(136, 176, 75, 0.6); transform: scale(1.05); }
        .super-seed .node-name { color: #88B04B; }
        
        /* 孤單彩蛋 */
        .easter-egg { color: #ff9800; font-weight: bold; margin-top: 10px; font-size: 0.9em; }
        
        /* 選擇屆數的按鈕 */
        .option-btn { margin: 5px; background-color: #e0e0e0; color: #333; }
        .option-btn:hover { background-color: #ccc; }
    </style>
</head>
<body>

    <h1>🌱 29 Super Seed 家族樹查詢</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="請輸入名字 (例如: 蔡孟儒)">
        <button onclick="searchName()">尋找</button>
    </div>

    <div id="options-container"></div>
    <div id="tree-container"></div>

    <script>
        let treeData = null;

        // 網頁載入時，自動讀取剛剛做好的 json 檔案
        fetch('family_tree_data.json')
            .then(response => response.json())
            .then(data => { treeData = data; })
            .catch(error => console.error('讀取資料失敗:', error));

        function searchName() {
            const inputName = document.getElementById('searchInput').value.trim();
            const optionsContainer = document.getElementById('options-container');
            const treeContainer = document.getElementById('tree-container');
            optionsContainer.innerHTML = '';
            treeContainer.innerHTML = '';

            if (!inputName || !treeData) return;

            // 尋找所有符合名字的人
            const matches = treeData.nodes.filter(n => n.name === inputName);

            if (matches.length === 0) {
                treeContainer.innerHTML = '<p>找不到這個名字耶，要不要檢查看看有沒有打錯字？</p>';
                return;
            }

            if (matches.length > 1) {
                // 遇到同名同姓，跳出選項按鈕
                optionsContainer.innerHTML = '<p>發現多位同名學長姐/學弟妹，請選擇屆數：</p>';
                matches.forEach(match => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `第 ${match.generation} 屆`;
                    btn.onclick = () => renderTree(match);
                    optionsContainer.appendChild(btn);
                });
            } else {
                // 只有一個人，直接畫出樹
                renderTree(matches[0]);
            }
        }

        function renderTree(targetNode) {
            document.getElementById('options-container').innerHTML = ''; // 清空選項
            const container = document.getElementById('tree-container');
            container.innerHTML = '';

            // 如果是孤單的節點 (全家就是你家)
            if (targetNode.isIsolated) {
                container.appendChild(createNodeCard(targetNode));
                const egg = document.createElement('div');
                egg.className = 'easter-egg';
                egg.innerText = '✨ 全家就是你家！獨立生長的酷酷靈魂 ✨';
                container.appendChild(egg);
                return;
            }

            // 簡單版呈現：我們把同一家族的人都抓出來，照屆數排列
            const familyNodes = treeData.nodes.filter(n => n.family === targetNode.family).sort((a, b) => b.generation - a.generation); // 由老到年輕 (32 -> 1) 排序可以看需求調整
            
            // 標示出樹狀清單
            familyNodes.forEach(node => {
                const card = createNodeCard(node);
                // 讓搜尋的目標稍微粗體標示
                if (node.id === targetNode.id) {
                    card.style.border = "3px dashed #88B04B";
                }
                container.appendChild(card);
            });
        }

        function createNodeCard(node) {
            const div = document.createElement('div');
            div.className = 'node-card';
            if (node.isSuperSeed) div.classList.add('super-seed');
            
            div.innerHTML = `
                <div class="node-generation">第 ${node.generation} 屆</div>
                <div class="node-name">${node.name}</div>
            `;
            return div;
        }
    </script>
</body>
</html>
