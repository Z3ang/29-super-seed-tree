<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>！家族樹！</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        /* 基礎排版設定 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #F5F5F5; color: #333; text-align: center; padding: 20px; }
        h1 { color: #88B04B; letter-spacing: 2px; }
        
        /* 搜尋框設計 */
        .search-box { margin: 20px; }
        input[type="text"] { padding: 10px; width: 200px; border: 2px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 15px; background-color: #88B04B; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #769941; }
        
        /* 選項與彩蛋區域 */
        #options-container { margin-bottom: 20px; }
        .option-btn { margin: 5px; background-color: #e0e0e0; color: #333; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .option-btn:hover { background-color: #ccc; }
        .easter-egg { color: #ff9800; font-weight: bold; margin-top: 30px; font-size: 1.2em; }
        
        /* 動態樹狀圖的專屬畫布範圍 */
        #tree-network { 
            width: 100%; 
            height: 60vh; /* 佔據螢幕 60% 高度 */
            background-color: #ffffff; 
            border: 2px dashed #ccc; 
            border-radius: 10px; 
            display: none; /* 一開始先隱藏，搜尋後才顯示 */
            margin: 0 auto;
            max-width: 1000px;
        }
    </style>
</head>
<body>

    <h1>！家族樹！</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ex: 王小明">
        <button onclick="searchName()">尋找</button>
    </div>

    <div id="options-container"></div>
    <div id="easter-egg-container"></div>
    
    <div id="tree-network"></div>

    <script>
        let treeData = null;
        let network = null; // 用來儲存動態樹狀圖的變數

        // 讀取資料庫
        fetch('family_tree_data.json')
            .then(response => response.json())
            .then(data => { treeData = data; })
            .catch(error => console.error('讀取資料失敗:', error));

        function searchName() {
            const inputName = document.getElementById('searchInput').value.trim();
            const optionsContainer = document.getElementById('options-container');
            const networkContainer = document.getElementById('tree-network');
            const eggContainer = document.getElementById('easter-egg-container');
            
            // 每次搜尋前先清空畫面
            optionsContainer.innerHTML = '';
            eggContainer.innerHTML = '';
            networkContainer.style.display = 'none';

            if (!inputName || !treeData) return;

            const matches = treeData.nodes.filter(n => n.name === inputName);

            if (matches.length === 0) {
                optionsContainer.innerHTML = '<p>找不到這個名字耶，要不要檢查看看有沒有打錯字？</p>';
                return;
            }

            if (matches.length > 1) {
                optionsContainer.innerHTML = '<p>發現多位同名學長姐/學弟妹，請選擇屆數：</p>';
                matches.forEach(match => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `第 ${match.generation} 屆`;
                    btn.onclick = () => renderTree(match);
                    optionsContainer.appendChild(btn);
                });
            } else {
                renderTree(matches[0]);
            }
        }

        function renderTree(targetNode) {
            document.getElementById('options-container').innerHTML = ''; 
            const networkContainer = document.getElementById('tree-network');
            const eggContainer = document.getElementById('easter-egg-container');

            // 處理孤單彩蛋
            if (targetNode.isIsolated) {
                networkContainer.style.display = 'none';
                eggContainer.innerHTML = `
                    <div class="easter-egg">✨ 全家就是你家！獨立生長的酷酷靈魂 ✨<br><br>
                    <span style="color:#88B04B">第 ${targetNode.generation} 屆 ${targetNode.name}</span></div>
                `;
                return;
            }

            // 打開樹狀圖畫布
            networkContainer.style.display = 'block';

            // 1. 抓出同一個家族的所有人
            const familyNodes = treeData.nodes.filter(n => n.family === targetNode.family);
            const familyNodeIds = new Set(familyNodes.map(n => n.id));
            
            // 2. 抓出這個家族裡所有的連線
            const familyLinks = treeData.links.filter(l => familyNodeIds.has(l.source) && familyNodeIds.has(l.target));

            // 3. 把資料轉換成動態圖表看得懂的格式
            const visNodes = new vis.DataSet(
                familyNodes.map(n => {
                    let nodeStyle = {
                        id: n.id,
                        label: `第 ${n.generation} 屆\n${n.name}`,
                        shape: 'box',
                        margin: 10,
                        borderWidth: 2,
                        color: { background: 'white', border: '#ccc' },
                        font: { size: 16, color: '#333' }
                    };

                    // 第29屆專屬發光特效
                    if (n.isSuperSeed) {
                        nodeStyle.color = { background: '#fafff0', border: '#88B04B' };
                        nodeStyle.borderWidth = 3;
                        nodeStyle.font = { color: '#88B04B', bold: true };
                        nodeStyle.shadow = { enabled: true, color: 'rgba(136, 176, 75, 0.6)', size: 10 };
                    }

                    // 搜尋的主角加上橘色外框強調
                    if (n.id === targetNode.id) {
                        nodeStyle.borderWidth = 4;
                        nodeStyle.color.border = '#ff9800';
                    }

                    return nodeStyle;
                })
            );

            const visEdges = new vis.DataSet(
                familyLinks.map(l => ({
                    from: l.source,
                    to: l.target,
                    arrows: 'to', // 畫出由上往下的箭頭
                    color: { color: '#bbb' }
                }))
            );

            // 4. 設定動態樹狀圖的排版規則與物理動畫
            const options = {
                layout: {
                    hierarchical: {
                        direction: 'UD', // 由上往下 (Up-Down)
                        sortMethod: 'directed',
                        levelSeparation: 90, // 上下層的間距
                        nodeSpacing: 180 // 左右節點的間距
                    }
                },
                physics: {
                    hierarchicalRepulsion: {
                        nodeDistance: 150
                    }
                },
                interaction: {
                    dragNodes: true, // 允許滑鼠拖曳節點
                    zoomView: true   // 允許滑鼠滾輪縮放
                }
            };

            // 5. 畫出樹狀圖！
            if (network !== null) {
                network.destroy(); // 清除上一筆搜尋的舊圖
            }
            network = new vis.Network(networkContainer, { nodes: visNodes, edges: visEdges }, options);
            
            // 需求4：畫完之後，讓畫面以動畫自動聚焦放大到「被搜尋的那個人」身上
            network.once('afterDrawing', function() {
                network.focus(targetNode.id, {
                    scale: 1.2,
                    animation: {
                        duration: 1200, // 動畫時間 1.2 秒
                        easingFunction: 'easeInOutQuad'
                    }
                });
            });
        }
    </script>
</body>
</html>
