<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>！家族樹！</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <style>
        /* 需求：視覺參考 [像素] [簡約現代] */
        * {
            /* 全網頁套用像素字體 */
            font-family: 'DotGothic16', sans-serif !important; 
            /* 所有框框改成直角，更簡約 */
            border-radius: 0 !important; 
        }

        /* 基礎排版設定 (簡約灰白) */
        body { background-color: #F0F0F0; color: #000000; text-align: center; padding: 20px; line-height: 1.6; }
        
        /* 標題需求：！家族樹！ (純文字排列，加大間距) */
        h1 { color: #000000; letter-spacing: 5px; font-weight: bold; margin-bottom: 40px; }
        
        /* 搜尋框設計 (簡約現代) */
        .search-box { margin: 20px; }
        input[type="text"] { padding: 12px; width: 220px; border: 2px solid #000000; background-color: #fff; font-size: 18px; color: #000; box-shadow: 4px 4px 0px #000000; /* 簡單的像素陰影 */ }
        button { padding: 12px 20px; background-color: #000000; color: #fff; border: 2px solid #000000; cursor: pointer; font-weight: bold; font-size: 18px; margin-left: 10px; box-shadow: 4px 4px 0px #888; }
        button:hover { background-color: #444444; color: #fff; border-color: #444444; }
        
        /* 選項與彩蛋區域 */
        #options-container { margin-bottom: 30px; }
        .option-btn { margin: 5px; background-color: #fff; color: #000; border: 2px solid #000; padding: 10px 18px; cursor: pointer; box-shadow: 3px 3px 0px #000; font-size: 16px; }
        .option-btn:hover { background-color: #E0E0E0; }
        
        .easter-egg { color: #000000; font-weight: bold; margin-top: 50px; font-size: 1.4em; letter-spacing: 1px; }
        
        /* 動態樹狀圖的專屬畫布範圍 (簡約簡潔) */
        #tree-network { 
            width: 100%; 
            height: 65vh; 
            background-color: #ffffff; 
            border: 3px solid #000000; 
            box-shadow: 8px 8px 0px #ccc; /* 像素風大陰影 */
            display: none; 
            margin: 0 auto;
            max-width: 1100px;
        }
    </style>
</head>
<body>

    <h1>！家族樹！</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ex: 王小明">
        <button onclick="searchName()">尋找</button>
    </div>

    <div id="options-container"></div>
    <div id="easter-egg-container"></div>
    
    <div id="tree-network"></div>

    <script>
        let treeData = null;
        let network = null; // 用來儲存動態樹狀圖的變數

        // 讀取資料庫
        fetch('family_tree_data.json')
            .then(response => response.json())
            .then(data => { treeData = data; })
            .catch(error => console.error('讀取資料失敗:', error));

        function searchName() {
            const inputName = document.getElementById('searchInput').value.trim();
            const optionsContainer = document.getElementById('options-container');
            const networkContainer = document.getElementById('tree-network');
            const eggContainer = document.getElementById('easter-egg-container');
            
            // 每次搜尋前先清空畫面
            optionsContainer.innerHTML = '';
            eggContainer.innerHTML = '';
            networkContainer.style.display = 'none';

            if (!inputName || !treeData) return;

            const matches = treeData.nodes.filter(n => n.name === inputName);

            if (matches.length === 0) {
                optionsContainer.innerHTML = '<p>找不到這個名字耶，確認一下有沒有打錯字？</p>';
                return;
            }

            if (matches.length > 1) {
                optionsContainer.innerHTML = '<p>發現多位同名學長姐/學弟妹，請選擇屆數：</p>';
                matches.forEach(match => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `第 ${match.generation} 屆`;
                    btn.onclick = () => renderTree(match);
                    optionsContainer.appendChild(btn);
                });
            } else {
                renderTree(matches[0]);
            }
        }

        function renderTree(targetNode) {
            document.getElementById('options-container').innerHTML = ''; 
            const networkContainer = document.getElementById('tree-network');
            const eggContainer = document.getElementById('easter-egg-container');

            // 處理孤單彩蛋
            if (targetNode.isIsolated) {
                networkContainer.style.display = 'none';
                eggContainer.innerHTML = `
                    <div class="easter-egg">✨ 全家就是你家！獨立生長的酷酷靈魂 ✨<br><br>
                    第 ${targetNode.generation} 屆 > ${targetNode.name}</div>
                `;
                return;
            }

            // 打開樹狀圖畫布
            networkContainer.style.display = 'block';

            // 1. 抓出同一個家族的所有人
            const familyNodes = treeData.nodes.filter(n => n.family === targetNode.family);
            const familyNodeIds = new Set(familyNodes.map(n => n.id));
            
            // 2. 抓出這個家族裡所有的連線
            const familyLinks = treeData.links.filter(l => familyNodeIds.has(l.source) && familyNodeIds.has(l.target));

            // 3. 把資料轉換成動態圖表看得懂的格式
            const visNodes = new vis.DataSet(
                familyNodes.map(n => {
                    // 需求：視覺參考 [簡約現代] [文字排列藝術]
                    // 我們將屆數和名字縮排，並加大名字字體，取消圓角。
                    let nodeStyle = {
                        id: n.id,
                        label: `NO.${n.generation}\n${n.name}`, // 層次排列
                        shape: 'box',
                        shapeProperties: { borderRadius: 0 }, // 銳利直角 (像素感)
                        margin: 15,
                        borderWidth: 2,
                        color: { background: '#FFFFFF', border: '#000000' }, // 簡約黑白
                        font: { size: 16, color: '#000000', face: 'DotGothic16', bold: false } // 像素字體
                    };

                    // 第29屆專屬特效 (黃綠色特定代表色 - 簡約扁平化)
                    if (n.isSuperSeed) {
                        nodeStyle.color = { background: '#88B04B', border: '#88B04B' }; // 用大塊顏色強調
                        nodeStyle.font = { color: '#FFFFFF', bold: true, size: 18 }; // 白色文字提高對比
                    }

                    // 搜尋的主角加上橘色外框強調 (文字排列藝術)
                    if (n.id === targetNode.id) {
                        nodeStyle.borderWidth = 4;
                        nodeStyle.color.border = '#ff9800'; 
                    }

                    return nodeStyle;
                })
            );

            const visEdges = new vis.DataSet(
                familyLinks.map(l => ({
                    from: l.source,
                    to: l.target,
                    arrows: 'to', // 畫出由上往下的箭頭
                    color: { color: '#666666' }, // 灰線更簡約
                    smooth: false // 需求：視覺參考 [簡約現代] - 用直線連線，不用曲線
                }))
            );

            // 4. 設定物理動畫效果 (保留彈彈的可愛感) 與 排版
            const options = {
                layout: {
                    hierarchical: {
                        direction: 'UD', // 由上往下 (Up-Down)
                        sortMethod: 'directed',
                        levelSeparation: 110, // 上下層的間距 (調大一點)
                        nodeSpacing: 220 // 左右節點的間距 (調大，增加文字排列空間)
                    }
                },
                physics: {
                    hierarchicalRepulsion: {
                        nodeDistance: 200, // 增加排斥距離，讓圖散開
                        damping: 0.1 // 增加一點阻尼，讓它不要彈太久，更有質感
                    },
                    stabilization: {
                        iterations: 150 // 搜尋後快速穩定
                    }
                },
                interaction: {
                    dragNodes: true, 
                    zoomView: true   
                }
            };

            // 5. 畫出樹狀圖！
            if (network !== null) {
                network.destroy(); // 清除上一筆搜尋的舊圖
            }
            network = new vis.Network(networkContainer, { nodes: visNodes, edges: visEdges }, options);
            
            // 畫完之後，讓畫面以動畫自動聚焦放大到「被搜尋的那個人」身上
            network.once('afterDrawing', function() {
                network.focus(targetNode.id, {
                    scale: 1.0,
                    animation: {
                        duration: 1000, // 動畫時間 1 秒
                        easingFunction: 'easeInOutQuad'
                    }
                });
            });
        }
    </script>
</body>
</html>
